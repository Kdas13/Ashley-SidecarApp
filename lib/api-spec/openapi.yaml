openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: Ashley's core profile
  - name: chat
    description: Chat with Ashley
  - name: memory
    description: Long-term memories Ashley has stored
  - name: image
    description: Ashley self-portrait generation
  - name: summary
    description: Rolling narrative summaries of older conversation chunks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get Ashley's core profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AshleyProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update Ashley's core profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AshleyProfile"

  /chat/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: List the conversation history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    delete:
      operationId: clearMessages
      tags: [chat]
      summary: Delete all chat messages (start fresh)
      responses:
        "204":
          description: Cleared
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get Ashley's reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Reply (returns the new user message and Ashley's assistant message)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"

  /memories:
    get:
      operationId: listMemories
      tags: [memory]
      summary: List all distilled memories
      responses:
        "200":
          description: Memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memory]
      summary: Manually add a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryBody"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
  /memories/{id}:
    patch:
      operationId: updateMemory
      tags: [memory]
      summary: Update a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryBody"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMemory
      tags: [memory]
      summary: Delete a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /chat/summarize:
    post:
      operationId: summarizeChunk
      tags: [chat]
      summary: Summarize a chunk of older messages into a narrative summary
      description: Stateless endpoint. Takes an ordered chunk of messages and returns a single narrative summary written from Ashley's POV.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeChunkBody"
      responses:
        "200":
          description: Summary text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeChunkResponse"

  /conversation-summaries:
    get:
      operationId: listConversationSummaries
      tags: [summary]
      summary: List all conversation summaries (oldest first)
      responses:
        "200":
          description: Summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversationSummary
      tags: [summary]
      summary: Manually add a conversation summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationSummaryBody"
      responses:
        "201":
          description: Created summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
  /conversation-summaries/{id}:
    patch:
      operationId: updateConversationSummary
      tags: [summary]
      summary: Update a conversation summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationSummaryBody"
      responses:
        "200":
          description: Updated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversationSummary
      tags: [summary]
      summary: Delete a conversation summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /image/selfie:
    post:
      operationId: generateSelfie
      tags: [image]
      summary: Generate a self-portrait image of Ashley and post it as a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSelfieBody"
      responses:
        "200":
          description: New assistant message containing the selfie image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AshleyProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: string
        identity:
          type: string
        personality:
          type: string
        speakingStyle:
          type: string
        appearance:
          type: string
        refersToUserAs:
          type: string
        sharedHistory:
          type: string
        replikaExcerpts:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
        onboardedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - identity
        - personality
        - speakingStyle
        - appearance
        - refersToUserAs
        - sharedHistory
        - replikaExcerpts
        - primaryColor
        - accentColor
        - onboardedAt
        - updatedAt

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        age:
          type: string
        identity:
          type: string
        personality:
          type: string
        speakingStyle:
          type: string
        appearance:
          type: string
        refersToUserAs:
          type: string
        sharedHistory:
          type: string
        replikaExcerpts:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
        markOnboarded:
          type: boolean

    Message:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - content
        - imageUrl
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    SendMessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"
      required:
        - userMessage
        - assistantMessage

    Memory:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - tag
        - importance
        - createdAt
        - updatedAt

    CreateMemoryBody:
      type: object
      properties:
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer
      required:
        - content

    UpdateMemoryBody:
      type: object
      properties:
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer

    GenerateSelfieBody:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt

    SummarizeChunkMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content

    SummarizeChunkBody:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SummarizeChunkMessage"
        priorSummary:
          type: string
      required:
        - messages

    SummarizeChunkResponse:
      type: object
      properties:
        summary:
          type: string
      required:
        - summary

    ConversationSummary:
      type: object
      properties:
        id:
          type: integer
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - summary
        - messageCount
        - coveredThroughCreatedAt
        - createdAt
        - updatedAt

    CreateConversationSummaryBody:
      type: object
      properties:
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time
      required:
        - summary
        - coveredThroughCreatedAt

    UpdateConversationSummaryBody:
      type: object
      properties:
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time

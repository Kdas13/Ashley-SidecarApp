openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: Ashley's core profile
  - name: chat
    description: Chat with Ashley
  - name: memory
    description: Long-term memories Ashley has stored
  - name: image
    description: Ashley self-portrait generation
  - name: summary
    description: Rolling narrative summaries of older conversation chunks
  - name: devices
    description: Per-device infrastructure (push tokens, etc.)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get Ashley's core profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AshleyProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update Ashley's core profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AshleyProfile"

  /chat/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: List the conversation history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    delete:
      operationId: clearMessages
      tags: [chat]
      summary: Delete all chat messages (start fresh)
      responses:
        "204":
          description: Cleared
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get Ashley's reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Reply (returns the new user message and Ashley's assistant message)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"

  /memories:
    get:
      operationId: listMemories
      tags: [memory]
      summary: List all distilled memories
      responses:
        "200":
          description: Memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memory]
      summary: Manually add a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryBody"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
  /memories/{id}:
    patch:
      operationId: updateMemory
      tags: [memory]
      summary: Update a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryBody"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMemory
      tags: [memory]
      summary: Delete a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /chat/summarize:
    post:
      operationId: summarizeChunk
      tags: [chat]
      summary: Summarize a chunk of older messages into a narrative summary
      description: Stateless endpoint. Takes an ordered chunk of messages and returns a single narrative summary written from Ashley's POV.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeChunkBody"
      responses:
        "200":
          description: Summary text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeChunkResponse"

  /conversation-summaries:
    get:
      operationId: listConversationSummaries
      tags: [summary]
      summary: List all conversation summaries (oldest first)
      responses:
        "200":
          description: Summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversationSummary
      tags: [summary]
      summary: Manually add a conversation summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationSummaryBody"
      responses:
        "201":
          description: Created summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
  /conversation-summaries/{id}:
    patch:
      operationId: updateConversationSummary
      tags: [summary]
      summary: Update a conversation summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationSummaryBody"
      responses:
        "200":
          description: Updated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversationSummary
      tags: [summary]
      summary: Delete a conversation summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /devices/push-token:
    post:
      operationId: setPushToken
      tags: [devices]
      summary: Register or clear this device's Expo push token
      description: |
        Upserts the push token used by the proactive scheduler to deliver
        "Ashley reaches out first" notifications. Pass `null` (or empty
        string) to clear — used when the user picks Off cadence or denies
        notification permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPushTokenBody"
      responses:
        "204":
          description: Saved
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /image/selfie:
    post:
      operationId: generateSelfie
      tags: [image]
      summary: Generate a self-portrait image of Ashley and post it as a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSelfieBody"
      responses:
        "200":
          description: New assistant message containing the selfie image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AshleyProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: string
        identity:
          type: string
        personality:
          type: string
        speakingStyle:
          type: string
        appearance:
          type: string
        refersToUserAs:
          type: string
        sharedHistory:
          type: string
        replikaExcerpts:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
        onboardedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - identity
        - personality
        - speakingStyle
        - appearance
        - refersToUserAs
        - sharedHistory
        - replikaExcerpts
        - primaryColor
        - accentColor
        - onboardedAt
        - updatedAt

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        age:
          type: string
        identity:
          type: string
        personality:
          type: string
        speakingStyle:
          type: string
        appearance:
          type: string
        refersToUserAs:
          type: string
        sharedHistory:
          type: string
        replikaExcerpts:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
        proactiveCadence:
          $ref: "#/components/schemas/ProactiveCadence"
        markOnboarded:
          type: boolean

    ProactiveCadence:
      type: string
      enum: [off, low, normal, high]
      description: |
        How often Ashley reaches out first.
          off    → no proactive sends at all
          low    → up to 1 / day
          normal → up to 2 / day  (default)
          high   → up to 4 / day
        Per-category caps (1/day each) and quiet hours apply on top of
        this global cap.

    SetPushTokenBody:
      type: object
      properties:
        token:
          type: ["string", "null"]
          maxLength: 256
          description: Expo push token, or null to clear.
      required:
        - token

    Message:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        selfieVibe:
          type: ["string", "null"]
          description: Encoded MODE|vibe payload for the primary selfie job. Set on Ashley messages that triggered image generation; null otherwise.
        selfieVibeList:
          type: ["string", "null"]
          description: JSON-encoded string[] of encoded MODE|vibe payloads for multi-image packets. Null on single-image messages.
        visualPacketId:
          type: ["string", "null"]
          description: UUID linking this message to its media_attachments rows. Null on single-image messages.
        imageUrls:
          type: ["array", "null"]
          items:
            type: ["string", "null"]
          description: >
            Resolved image URLs from media_attachments rows, ordered by sort_order.
            Null entries at specific positions indicate failed generation slots — position
            is preserved so the UI can show an error tile in the correct slot.
            Null on single-image messages.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - content
        - imageUrl
        - createdAt

    MediaAttachment:
      type: object
      description: >
        Represents a single image within a multi-image visual packet.
        Generated images have role "generated_option" and start with status "pending"
        until the selfie pipeline completes. User-uploaded images have role "user_input"
        and are inserted with status "ready". The attributeScope field governs whether
        visual attributes from this image may carry forward into future replies.
      properties:
        id:
          type: string
        messageId:
          type: string
        visualPacketId:
          type: string
        role:
          type: string
          enum:
            - generated_option
            - user_input
            - reference
            - corrected_output
            - comparison_set
            - approved_anchor
            - rejected_example
          description: >
            Active: "generated_option" (Ashley offered this image; temporary attributes only)
            and "user_input" (user uploaded as reference material).
            Reserved future values: "reference" (canonical pinned photo),
            "corrected_output" (user-corrected version of a prior generated_option),
            "comparison_set" (side-by-side options in one packet),
            "approved_anchor" (user explicitly approved as long-term visual anchor),
            "rejected_example" (user rejected; model should avoid similar outputs).
        status:
          type: string
          enum: [pending, ready, failed]
        selfieVibe:
          type: ["string", "null"]
          description: Encoded MODE|vibe payload (generated_option rows only).
        intent:
          type: ["string", "null"]
          description: Image-mode name extracted from the marker (generated_option rows only).
        description:
          type: ["string", "null"]
          description: Per-image description or user caption, capped at 500 chars.
        attributeScope:
          type: string
          enum: [temporary, permanent]
          default: temporary
        imageUrl:
          type: ["string", "null"]
          description: Resolved URL. Null until the selfie job completes.
        sortOrder:
          type: integer
          description: 0-based position within the visual packet.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - messageId
        - visualPacketId
        - role
        - status
        - attributeScope
        - sortOrder
        - createdAt
        - updatedAt

    SendImageRequest:
      type: object
      description: >
        Body for POST /chat/image. Supports a single image (legacy) or an array of
        images (multi-image packet). Exactly one of `image` or `images` must be
        present; sending both or neither returns 400.
        The `userMessage` wrapper carries the client-generated message ID so the
        server can insert with a stable ID the client already knows about.
      properties:
        userMessage:
          type: object
          description: Client-generated message metadata.
          properties:
            id:
              type: string
              minLength: 8
              maxLength: 128
            content:
              type: string
              description: Optional caption or user text accompanying the image(s).
            replyTo:
              type: ["object", "null"]
              description: Optional reply-to reference (id, role, preview).
          required:
            - id
        image:
          type: object
          description: Single-image path — kept for backwards compat with older clients.
          properties:
            base64:
              type: string
              description: Base64-encoded image data.
            mimeType:
              type: string
              description: MIME type (e.g. image/jpeg, image/png, image/webp).
          required:
            - base64
            - mimeType
        images:
          type: array
          description: Multi-image path — up to 4 images, each with its own base64 + mimeType.
          minItems: 1
          maxItems: 4
          items:
            type: object
            properties:
              base64:
                type: string
              mimeType:
                type: string
            required:
              - base64
              - mimeType
        category:
          type: string
          description: User-selected image category (e.g. selfie, medical, document, scene).
        mode:
          type: string
          description: Analysis mode (e.g. quick, detailed, memory).
        clientNow:
          type: string
          format: date-time
          description: Client wall-clock timestamp for quiet-hours calculation.
        clientTimezone:
          type: string
          description: IANA timezone string from the client device.
      required:
        - userMessage
        - category
        - mode

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    SendMessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"
      required:
        - userMessage
        - assistantMessage

    Memory:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - tag
        - importance
        - createdAt
        - updatedAt

    CreateMemoryBody:
      type: object
      properties:
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer
      required:
        - content

    UpdateMemoryBody:
      type: object
      properties:
        content:
          type: string
        tag:
          type: string
        importance:
          type: integer

    GenerateSelfieBody:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt

    SummarizeChunkMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content

    SummarizeChunkBody:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SummarizeChunkMessage"
        priorSummary:
          type: string
      required:
        - messages

    SummarizeChunkResponse:
      type: object
      properties:
        summary:
          type: string
      required:
        - summary

    ConversationSummary:
      type: object
      properties:
        id:
          type: integer
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - summary
        - messageCount
        - coveredThroughCreatedAt
        - createdAt
        - updatedAt

    CreateConversationSummaryBody:
      type: object
      properties:
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time
      required:
        - summary
        - coveredThroughCreatedAt

    UpdateConversationSummaryBody:
      type: object
      properties:
        summary:
          type: string
        messageCount:
          type: integer
        coveredThroughCreatedAt:
          type: string
          format: date-time

name: Atlas One v1.4.2 APK

on:
  pull_request:
    branches: [main]
    paths:
      - "atlas-one-v1.4.2-source/**"
      - ".github/workflows/atlas-one-v1.4.2-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Atlas One v1.4 source
        run: |
          mkdir -p atlas-one-apk
          base64 --decode atlas-one-apk-source/payload.b64 > /tmp/atlas-one-apk.tgz
          echo "5663d41968f48c10d38ecab4f2323b3183ad46d70086af9bb1dd90e425b296ea  /tmp/atlas-one-apk.tgz" | sha256sum --check
          tar -xzf /tmp/atlas-one-apk.tgz -C atlas-one-apk
          base64 --decode atlas-one-v1.4-source/App.patch.gz.b64 | gzip -d > /tmp/App-v1.4.patch
          cd atlas-one-apk
          patch --batch --forward -p0 < /tmp/App-v1.4.patch

      - name: Apply conversation intelligence and anti-loop patch
        run: |
          base64 --decode atlas-one-v1.4.2-source/App.patch.gz.b64 | gzip -d > /tmp/App-v1.4.2.patch
          cd atlas-one-apk
          patch --batch --forward -p1 < /tmp/App-v1.4.2.patch
          cp ../atlas-one-v1.4.2-source/package.json package.json
          cp ../atlas-one-v1.4.2-source/app.json app.json
          grep -q "ANTI-LOOP CORRECTION" App.tsx
          grep -q "Existing app-private artifacts" App.tsx
          grep -q "requestsNewDocument" App.tsx
          grep -q "isArtifactConfirmationEcho" App.tsx
          ! grep -q "downloadable file).*txt" App.tsx

      - name: Install dependencies
        working-directory: atlas-one-apk
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: atlas-one-apk
        run: npm run typecheck

      - name: Generate Android project
        working-directory: atlas-one-apk
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Android release APK
        working-directory: atlas-one-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify installability and embedded intelligence fix
        run: |
          cp atlas-one-apk/android/app/build/outputs/apk/release/app-release.apk Atlas-One-v1.4.2.apk
          test -s Atlas-One-v1.4.2.apk
          unzip -t Atlas-One-v1.4.2.apk
          unzip -p Atlas-One-v1.4.2.apk assets/index.android.bundle > /tmp/index.android.bundle
          grep -a -q "ANTI-LOOP CORRECTION" /tmp/index.android.bundle
          grep -a -q "Existing app-private artifacts" /tmp/index.android.bundle
          grep -a -q "A question about an existing file is NOT a request to create it again" /tmp/index.android.bundle
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$ZIPALIGN" -c -P 16 4 Atlas-One-v1.4.2.apk
          "$APKSIGNER" verify --verbose --print-certs Atlas-One-v1.4.2.apk | tee Atlas-One-v1.4.2-signature.txt
          sha256sum Atlas-One-v1.4.2.apk | tee Atlas-One-v1.4.2.apk.sha256

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-One-v1.4.2-APK
          path: |
            Atlas-One-v1.4.2.apk
            Atlas-One-v1.4.2.apk.sha256
            Atlas-One-v1.4.2-signature.txt
          if-no-files-found: error
          retention-days: 30

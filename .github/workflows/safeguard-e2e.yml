name: safeguard-e2e

# Guards the Safeguard appointment + follow-up happy path. See
# `artifacts/safeguard/tests/e2e/appointment-flow.spec.ts` for what it
# actually walks. Required secrets are listed in the `env:` block below;
# if any is missing the suite will fail fast — that is intentional.

on:
  pull_request:
    paths:
      - "artifacts/safeguard/**"
      - "artifacts/safeguard-api/**"
      - "lib/db/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/safeguard-e2e.yml"
  push:
    branches: [main]
    paths:
      - "artifacts/safeguard/**"
      - "artifacts/safeguard-api/**"
      - "lib/db/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/safeguard-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: safeguard
          POSTGRES_PASSWORD: safeguard
          POSTGRES_DB: safeguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U safeguard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://safeguard:safeguard@localhost:5432/safeguard
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.SAFEGUARD_CLERK_PUBLISHABLE_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.SAFEGUARD_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.SAFEGUARD_CLERK_SECRET_KEY }}
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${{ secrets.SAFEGUARD_OPENAI_BASE_URL }}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${{ secrets.SAFEGUARD_OPENAI_API_KEY }}
      # Force Playwright to manage the Safeguard servers itself rather than
      # talk to a Replit dev URL.
      E2E_BASE_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push Safeguard schema
        run: pnpm --filter @workspace/db run push --force
      - name: Install Playwright browsers
        run: pnpm --filter @workspace/safeguard exec playwright install --with-deps chromium
      - name: Run Safeguard e2e
        run: pnpm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/safeguard/playwright-report
          if-no-files-found: ignore

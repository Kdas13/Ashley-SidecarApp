name: Echo Foundation 0.4 Standalone Android APK

on:
  push:
    branches: [echo/foundation-0.4-checkpoint]
    paths:
      - '.github/workflows/echo-foundation-0.4-apk.yml'
      - 'echo-foundation/source/0.4.0/apps/mobile/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/echo-foundation-0.4-apk.yml'
      - 'echo-foundation/source/0.4.0/apps/mobile/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: echo-foundation-0.4-standalone-apk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build standalone release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: echo-foundation/source/0.4.0/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          cache: npm
          cache-dependency-path: echo-foundation/source/0.4.0/apps/mobile/package.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install pinned mobile dependencies
        run: npm install --no-audit --no-fund
      - name: Verify Expo source
        run: |
          npm run typecheck
          npx expo-doctor
      - name: Generate Android project
        env:
          CI: '1'
        run: npx expo prebuild --platform android --clean --no-install
      - name: Build release APK with embedded JavaScript
        working-directory: echo-foundation/source/0.4.0/apps/mobile/android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Prepare installable APK
        shell: bash
        run: |
          set -euo pipefail
          source_apk="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -n "$source_apk"

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$build_tools/apksigner"
          test -x "$build_tools/zipalign"

          if "$build_tools/apksigner" verify "$source_apk" >/dev/null 2>&1; then
            cp "$source_apk" Echo-Foundation-0.4.0-standalone.apk
          else
            keytool -genkeypair -v \
              -keystore echo-standalone.jks \
              -storepass echo-foundation \
              -keypass echo-foundation \
              -alias echo \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650 \
              -dname 'CN=Echo Foundation, OU=Development, O=Kane Stewart, C=GB'
            "$build_tools/zipalign" -p -f 4 "$source_apk" Echo-Foundation-0.4.0-aligned.apk
            "$build_tools/apksigner" sign \
              --ks echo-standalone.jks \
              --ks-key-alias echo \
              --ks-pass pass:echo-foundation \
              --key-pass pass:echo-foundation \
              --out Echo-Foundation-0.4.0-standalone.apk \
              Echo-Foundation-0.4.0-aligned.apk
          fi

          "$build_tools/apksigner" verify --verbose Echo-Foundation-0.4.0-standalone.apk
      - name: Verify embedded bundle and package
        shell: bash
        run: |
          set -euo pipefail
          unzip -l Echo-Foundation-0.4.0-standalone.apk | tee apk-contents.txt
          grep -q 'assets/index.android.bundle' apk-contents.txt
          test "$(unzip -p Echo-Foundation-0.4.0-standalone.apk AndroidManifest.xml | wc -c)" -gt 0
          sha256sum Echo-Foundation-0.4.0-standalone.apk | tee Echo-Foundation-0.4.0-standalone.sha256
      - name: Upload standalone APK
        uses: actions/upload-artifact@v4
        with:
          name: Echo-Foundation-0.4.0-standalone-APK
          path: |
            echo-foundation/source/0.4.0/apps/mobile/Echo-Foundation-0.4.0-standalone.apk
            echo-foundation/source/0.4.0/apps/mobile/Echo-Foundation-0.4.0-standalone.sha256
          if-no-files-found: error
          retention-days: 30

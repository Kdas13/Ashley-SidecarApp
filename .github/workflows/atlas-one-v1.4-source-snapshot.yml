name: Atlas One v1.4 Source Snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/atlas-one-v1.4-source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore v1.4 source
        run: |
          mkdir -p atlas-one-source
          base64 --decode atlas-one-apk-source/payload.b64 > /tmp/atlas-one-apk.tgz
          echo "5663d41968f48c10d38ecab4f2323b3183ad46d70086af9bb1dd90e425b296ea  /tmp/atlas-one-apk.tgz" | sha256sum --check
          tar -xzf /tmp/atlas-one-apk.tgz -C atlas-one-source
          base64 --decode atlas-one-v1.4-source/App.patch.gz.b64 | gzip -d > /tmp/App.patch
          cd atlas-one-source
          patch --batch --forward -p0 < /tmp/App.patch
          cp ../atlas-one-v1.4-source/package.json package.json
          cp ../atlas-one-v1.4-source/app.json app.json
          cd ..
          tar -czf Atlas-One-v1.4-source.tgz -C atlas-one-source .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-One-v1.4-source
          path: Atlas-One-v1.4-source.tgz
          retention-days: 7

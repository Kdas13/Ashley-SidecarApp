name: Echo Foundation 0.4 Checkpoint CI

on:
  push:
    branches:
      - echo/foundation-0.4-checkpoint
    paths:
      - '.github/workflows/echo-foundation-0.4-checkpoint.yml'
      - 'echo-foundation/checkpoints/0.4.0/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/echo-foundation-0.4-checkpoint.yml'
      - 'echo-foundation/checkpoints/0.4.0/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: echo-foundation-0.4-checkpoint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
      - name: Extract committed checkpoint
        run: |
          mkdir -p "$RUNNER_TEMP/echo04"
          unzip -q echo-foundation/checkpoints/0.4.0/Echo_Foundation_0_4_0_VERIFIED_LOCAL.zip -d "$RUNNER_TEMP/echo04"
          test -f "$RUNNER_TEMP/echo04/echo-foundation-0.4.0-release/package-lock.json"
      - name: Install locked dependencies
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release
        run: npm ci
      - name: Strict TypeScript
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release
        run: npm run typecheck
      - name: Automated tests
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release
        run: npm test
      - name: Production builds
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release
        run: npm run build
      - name: Mobile source syntax
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release
        run: npm run check:mobile-syntax

  mobile:
    name: Expo verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
      - name: Extract committed checkpoint
        run: |
          mkdir -p "$RUNNER_TEMP/echo04"
          unzip -q echo-foundation/checkpoints/0.4.0/Echo_Foundation_0_4_0_VERIFIED_LOCAL.zip -d "$RUNNER_TEMP/echo04"
          test -f "$RUNNER_TEMP/echo04/echo-foundation-0.4.0-release/apps/mobile/package-lock.json"
      - name: Install mobile dependencies
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release/apps/mobile
        run: npm ci
      - name: Mobile TypeScript
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release/apps/mobile
        run: npm run typecheck
      - name: Expo doctor
        working-directory: ${{ runner.temp }}/echo04/echo-foundation-0.4.0-release/apps/mobile
        run: npm run doctor

name: Atlas One v1.5 APK

on:
  pull_request:
    branches: [main]
    paths:
      - "atlas-one-v1.5-source/**"
      - ".github/workflows/atlas-one-v1.5-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Restore modular v1.5 source
        run: |
          mkdir -p atlas-one-v1.5
          cat atlas-one-v1.5-source/source.part*.b64 > /tmp/atlas-one-v1.5-source.b64
          test "$(wc -c < /tmp/atlas-one-v1.5-source.b64)" -eq 54288
          base64 --decode /tmp/atlas-one-v1.5-source.b64 > /tmp/atlas-one-v1.5-source.tgz
          echo "14d75d8afbd74c41e9a231dd52c53d194f66354b5a7e220636ce33116d657df7  /tmp/atlas-one-v1.5-source.tgz" | sha256sum --check
          tar -xzf /tmp/atlas-one-v1.5-source.tgz -C atlas-one-v1.5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: atlas-one-v1.5/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies with bounded retries
        working-directory: atlas-one-v1.5
        env:
          NPM_CONFIG_FETCH_RETRIES: "5"
          NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "60000"
          NPM_CONFIG_FETCH_TIMEOUT: "120000"
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            echo "npm install attempt ${attempt}/3"
            rm -rf node_modules
            if timeout 360 npm ci --no-audit --no-fund --prefer-offline 2>&1 | tee "/tmp/npm-ci-${attempt}.log"; then
              test -f node_modules/expo/package.json
              exit 0
            fi
            tail -100 "/tmp/npm-ci-${attempt}.log" || true
            npm cache verify || true
            sleep $((attempt * 10))
          done
          echo "Dependency installation failed after three bounded attempts" >&2
          exit 1
      - name: Typecheck
        working-directory: atlas-one-v1.5
        run: npm run typecheck
      - name: Tests
        working-directory: atlas-one-v1.5
        run: npm test
      - name: Generate Android project
        working-directory: atlas-one-v1.5
        run: npx expo prebuild --platform android --clean --no-install
      - name: Build release APK
        working-directory: atlas-one-v1.5/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Verify release
        run: |
          cp atlas-one-v1.5/android/app/build/outputs/apk/release/app-release.apk Atlas-One-v1.5.0.apk
          test -s Atlas-One-v1.5.0.apk
          unzip -t Atlas-One-v1.5.0.apk
          unzip -p Atlas-One-v1.5.0.apk assets/index.android.bundle > /tmp/index.android.bundle
          grep -a -q "ANTI-REPETITION RETRY" /tmp/index.android.bundle
          grep -a -q "Android workspace" /tmp/index.android.bundle
          grep -a -q "SEPARATE CONTEXTS" /tmp/index.android.bundle
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$ZIPALIGN" -c -P 16 4 Atlas-One-v1.5.0.apk
          "$APKSIGNER" verify --verbose --print-certs Atlas-One-v1.5.0.apk | tee Atlas-One-v1.5.0-signature.txt
          sha256sum Atlas-One-v1.5.0.apk | tee Atlas-One-v1.5.0.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-One-v1.5.0-APK
          path: |
            Atlas-One-v1.5.0.apk
            Atlas-One-v1.5.0.apk.sha256
            Atlas-One-v1.5.0-signature.txt
          if-no-files-found: error
          retention-days: 30

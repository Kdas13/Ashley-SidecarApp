name: Atlas One v1.3.2 APK

on:
  pull_request:
    branches: [main]
    paths:
      - "atlas-one-v1.3.2-overlay/**"
      - ".github/workflows/atlas-one-v1.3.2-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore verified Atlas One mobile source
        run: |
          mkdir -p atlas-one-apk
          base64 --decode atlas-one-apk-source/payload.b64 > /tmp/atlas-one-apk.tgz
          echo "5663d41968f48c10d38ecab4f2323b3183ad46d70086af9bb1dd90e425b296ea  /tmp/atlas-one-apk.tgz" | sha256sum --check
          tar -xzf /tmp/atlas-one-apk.tgz -C atlas-one-apk

      - name: Apply v1.3.2 image and document-pipeline client overlay
        run: |
          cp -R atlas-one-v1.3.2-overlay/mobile/src/. atlas-one-apk/src/

      - name: Install dependencies
        working-directory: atlas-one-apk
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: atlas-one-apk
        run: npx tsc --noEmit

      - name: Generate Android project
        working-directory: atlas-one-apk
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build properly signed release APK
        working-directory: atlas-one-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK installability
        run: |
          cp atlas-one-apk/android/app/build/outputs/apk/release/app-release.apk Atlas-One-v1.3.2.apk
          test -s Atlas-One-v1.3.2.apk
          unzip -t Atlas-One-v1.3.2.apk
          unzip -l Atlas-One-v1.3.2.apk | grep -q 'assets/index.android.bundle'
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$ZIPALIGN" -c -P 16 4 Atlas-One-v1.3.2.apk
          "$APKSIGNER" verify --verbose --print-certs Atlas-One-v1.3.2.apk
          sha256sum Atlas-One-v1.3.2.apk | tee Atlas-One-v1.3.2.apk.sha256

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-One-v1.3.2-APK
          path: |
            Atlas-One-v1.3.2.apk
            Atlas-One-v1.3.2.apk.sha256
          if-no-files-found: error
          retention-days: 30

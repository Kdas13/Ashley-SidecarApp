[build]
builder = "RAILPACK"
buildCommand = "corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm run ci:sidecar"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/readyz"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 0
drainingSeconds = 30
